<html>
    <head>
       <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
            <h1>Jimmy's Diner</h1>
            <h2>The best burgers and pizza in town.</h2>
        </header>
        <div id="menu_container" class="menu_container flex">
            <!-- Food items appear in this container -->
        </div>
             
        <div id="order_container" class="order_container flex">
            <!-- Order checkout appears in this container -->
        </div>

        <div id="form_container" class="form_container">
            <form id="form">
                <h4>Enter card details</h4>
                <input title="Letters only" type="text" maxlength="25" minlength="3" placeholder="Enter your name" pattern="[A-Za-z\s]+">
                <input title="Input a 16 digit card number" inputmode="numeric" type="text" maxlength="16" minlength="16" required placeholder="Enter card number" pattern="[0-9]{16}">
                <input title="Input a 3 digit CVV" inputmode="numeric" type="text" maxlength="3" minlength="3" required placeholder="Enter CVV" pattern="[0-9]{3}">
                <button id="pay_btn" class="pay_btn" type="submit">Pay</button>
            </form>
        </div>
	<script src="index.js" type="module"></script>
    </body>
</html>
